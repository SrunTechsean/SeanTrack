<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SeanTrack</title>
        <link rel="stylesheet" href="css/reset.css">
        <link rel="stylesheet" href="css/var.css">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div class="container">
            <header class="header">
                <h2 class="header__logo">SeanTrack</h2>
                <div class="header__nav">
                    <ul class="header__menu">
                        <li class="header__item">
                            <a href="#" class="header__link">
                                <span class="icon header__icon">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="lucide lucide-house-icon lucide-house"
                                    >
                                        <title>Dashboard</title>
                                        <path
                                            d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"
                                        />
                                        <path
                                            d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
                                        />
                                    </svg>
                                </span>
                                <span class="header__label">Dashboard</span>
                            </a>
                        </li>
                        <li class="header__item">
                            <a href="#" class="header__link">
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="24"
                                    height="24"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    class="icon header__icon"
                                    aria-hidden="true"
                                >
                                    <rect
                                        width="8"
                                        height="4"
                                        x="8"
                                        y="2"
                                        rx="1"
                                        ry="1"
                                    />
                                    <path
                                        d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"
                                    />
                                    <path d="M12 11h4" />
                                    <path d="M12 16h4" />
                                    <path d="M8 11h.01" />
                                    <path d="M8 16h.01" />
                                </svg>
                                <span class="header__label">Log</span>
                            </a>
                        </li>
                        <li class="header__item">
                            <a href="#" class="header__link">
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="24"
                                    height="24"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    class="icon header__icon"
                                    aria-hidden="true"
                                >
                                    <path d="M3 3v16a2 2 0 0 0 2 2h16" />
                                    <path d="M18 17V9" />
                                    <path d="M13 17V5" />
                                    <path d="M8 17v-3" />
                                </svg>
                                <span class="header__label">Weekly</span>
                            </a>
                        </li>
                    </ul>
                </div>

                <img
                    src="https://ui-avatars.com/api/?name=Tech+Sean&background=1a92d4&color=fff"
                    alt="Profile"
                    class="profile header__profile"
                >
            </header>
            <main class="main">
                <section class="main__header">
                    <h3 class="main__greeting">Good Morning, Techsean</h3>
                    <p class="main__date">Tuesday, April 14</p>
                </section>
                <section class="card main__progess"></section>
                <section class="card main__macros"></section>
                <section class="card main__add"></section>
                <section class="main__log"></section>
            </main>
        </div>
    </body>
</html>
